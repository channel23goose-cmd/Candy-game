<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Конфеты</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #2b0036, #4b0082);
  font-family: Arial;
  color: gold;
  overflow: hidden;
}

.container {
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 30px gold;
  text-align: center;
  animation: fadeIn 1s ease;
}

h1 {
  font-size: 40px;
  margin: 10px 0;
  transition: 0.3s;
}

h1.change {
  transform: scale(1.2);
  text-shadow: 0 0 15px gold;
}

button {
  font-size: 20px;
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, gold, #ffd700);
  color: #4b0082;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.15) rotate(2deg);
  box-shadow: 0 0 15px gold;
}

.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  animation: fly 1s linear forwards;
}

@keyframes fly {
  to {
    transform: translateY(-200px) scale(0);
    opacity: 0;
  }
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.8);}
  to {opacity: 1; transform: scale(1);}
}
</style>
</head>
<body>

<div class="container">
  <h2 id="info"></h2>
  <h1 id="candies"></h1>

  <button onclick="take(1)">1</button>
  <button onclick="take(2)">2</button>
  <button onclick="take(3)">3</button>
</div>

<script>
let candies, player;

function start() {
  candies = Math.floor(Math.random() * 11) + 20;
  player = 1;
  update();
}

function update() {
  let c = document.getElementById("candies");
  c.innerText = "Конфеты: " + candies;

  c.classList.add("change");
  setTimeout(()=>c.classList.remove("change"),300);

  document.getElementById("info").innerText = "Игрок " + player;
}

function sparks() {
  for (let i = 0; i < 20; i++) {
    let s = document.createElement("div");
    s.className = "spark";
    s.style.left = Math.random()*window.innerWidth + "px";
    s.style.top = window.innerHeight + "px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

function take(n) {
  if (n > candies) return;
  candies -= n;

  if (candies === 0) {
    sparks();
    setTimeout(()=>{
      alert("Победил игрок " + player);
      start();
    },500);
    return;
  }

  player = player === 1 ? 2 : 1;
  update();
}

start();
</script>

</body>
</html>
start();
</script>

</body>
</html>
